# ============================================================
# REDE OVERLAY — compatível com Docker Swarm e docker compose
# attachable: true permite containers avulsos se conectarem
# ============================================================
networks:
  app_network:
    driver: overlay
    attachable: true

# ============================================================
# NAMED VOLUMES — persistência de dados além do ciclo do container
# ============================================================
volumes:
  postgres_data:
  redis_data:

services:

  # ----------------------------------------------------------
  # BANCO DE DADOS
  # ----------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agendamento_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
      - ./scripts/seed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure

  # ----------------------------------------------------------
  # CACHE (Redis)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure

  # ----------------------------------------------------------
  # APP NODE.JS — sem porta exposta ao host (privado)
  # image: obrigatório para docker stack deploy usar a imagem local
  # build: usado pelo docker compose build
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agendamento_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agendamento_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      JWT_SECRET: supersecretjwtkey2024
      JWT_EXPIRES_IN: 1d
      PORT: 3000
      NODE_ENV: development
    networks:
      - app_network
    # Sem 'ports' — acesso só via Nginx
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ----------------------------------------------------------
  # NGINX — proxy reverso, único ponto de entrada externo
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network
    deploy:
      restart_policy:
        condition: on-failure
