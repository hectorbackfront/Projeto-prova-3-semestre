<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="Arial, sans-serif">
  <rect width="960" height="440" fill="#f0f4f8"/>

  <text x="480" y="33" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">DER — Diagrama Entidade-Relacionamento — Sistema de Agendamentos</text>
  <text x="480" y="52" text-anchor="middle" font-size="11" fill="#636e72" font-style="italic">Nível Conceitual</text>

  <!-- USUARIO -->
  <rect x="25" y="188" width="145" height="48" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="97" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="white">USUARIO</text>

  <!-- AGENDAMENTO -->
  <rect x="365" y="188" width="160" height="48" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="445" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AGENDAMENTO</text>

  <!-- AGENDAMENTO_SERVICO (pivô) -->
  <rect x="642" y="158" width="175" height="72" rx="6" fill="#6c3483" stroke="#512e5f" stroke-width="2"/>
  <text x="729" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="white">AGENDAMENTO</text>
  <text x="729" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_SERVICO</text>
  <text x="729" y="222" text-anchor="middle" font-size="10" fill="#ddd">(tabela pivô)</text>

  <!-- SERVICO -->
  <rect x="835" y="188" width="120" height="48" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="895" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SERVICO</text>

  <!-- CLIENTE -->
  <rect x="365" y="340" width="160" height="48" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="445" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CLIENTE</text>

  <!-- USUARIO (1) --atende-- (N) AGENDAMENTO -->
  <line x1="170" y1="212" x2="365" y2="212" stroke="#555" stroke-width="2"/>
  <text x="177" y="207" font-size="12" font-weight="bold" fill="#1a1a2e">1</text>
  <text x="350" y="207" font-size="12" font-weight="bold" fill="#1a1a2e">N</text>
  <text x="267" y="230" text-anchor="middle" font-size="10" fill="#555" font-style="italic">atende</text>

  <!-- AGENDAMENTO (1) --possui-- (N) AGENDAMENTO_SERVICO -->
  <line x1="525" y1="212" x2="642" y2="194" stroke="#555" stroke-width="2"/>
  <text x="530" y="207" font-size="12" font-weight="bold" fill="#1a1a2e">1</text>
  <text x="626" y="189" font-size="12" font-weight="bold" fill="#1a1a2e">N</text>
  <text x="582" y="228" text-anchor="middle" font-size="10" fill="#555" font-style="italic">possui</text>

  <!-- AGENDAMENTO_SERVICO (N) --referencia-- (1) SERVICO -->
  <line x1="817" y1="194" x2="835" y2="212" stroke="#555" stroke-width="2"/>
  <text x="800" y="189" font-size="12" font-weight="bold" fill="#1a1a2e">N</text>
  <text x="837" y="207" font-size="12" font-weight="bold" fill="#1a1a2e">1</text>

  <!-- CLIENTE (1) --realiza-- (N) AGENDAMENTO -->
  <line x1="445" y1="340" x2="445" y2="236" stroke="#555" stroke-width="2"/>
  <text x="452" y="336" font-size="12" font-weight="bold" fill="#1a1a2e">1</text>
  <text x="452" y="250" font-size="12" font-weight="bold" fill="#1a1a2e">N</text>
  <text x="462" y="295" font-size="10" fill="#555" font-style="italic">realiza</text>

  <!-- N:N note -->
  <text x="729" y="256" text-anchor="middle" font-size="11" fill="#6c3483" font-weight="bold">N:N</text>
  <text x="729" y="270" text-anchor="middle" font-size="9" fill="#888" font-style="italic">resolvida via pivô</text>

  <!-- Legend -->
  <rect x="25" y="398" width="13" height="13" rx="2" fill="#6c3483" stroke="#512e5f"/>
  <text x="44" y="409" font-size="11" fill="#444">Tabela pivô — resolve relação N:N entre AGENDAMENTO e SERVICO</text>
  <rect x="25" y="417" width="13" height="13" rx="2" fill="#2c3e50" stroke="#1a252f"/>
  <text x="44" y="428" font-size="11" fill="#444">Entidade principal</text>
</svg>
