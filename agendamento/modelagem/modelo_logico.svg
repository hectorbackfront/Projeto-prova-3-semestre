<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="550" viewBox="0 0 1000 550" font-family="Arial, sans-serif">
  <rect width="1000" height="550" fill="#f8f9fa"/>

  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Modelo Lógico — Sistema de Agendamentos</text>

  <defs>
