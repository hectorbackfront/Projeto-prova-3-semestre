  <line x1="700" y1="471" x2="965" y2="471" stroke="#d9c4e8" stroke-width="1"/>

  <!-- ================================================================ -->
  <!-- FK CONNECTOR LINES (dashed red) -->
  <!-- ================================================================ -->

  <!-- usuario_id → USUARIOS.id -->
  <!-- From AGENDAMENTOS left (330) at row center y=290, to USUARIOS right (270) at row id center y=101 -->
  <path d="M330,290 L280,290 L280,101 L270,101" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fk-arrow)"/>

  <!-- cliente_id → CLIENTES.id -->
  <!-- From AGENDAMENTOS left (330) at row center y=268, to CLIENTES right (270) at row id center y=416 -->
  <path d="M330,268 L295,268 L295,416 L270,416" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fk-arrow)"/>

  <!-- agendamento_id → AGENDAMENTOS.id -->
  <!-- From AGDS left (700) at row center y=438, to AGENDAMENTOS right (625) at row id center y=246 -->
  <path d="M700,438 L660,438 L660,246 L625,246" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fk-arrow)"/>

  <!-- servico_id → SERVICOS.id -->
  <!-- From AGDS right (965) at row center y=460, up to SERVICOS right (965) at row id center y=101 -->
  <path d="M965,460 L980,460 L980,101 L965,101" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fk-arrow)"/>

